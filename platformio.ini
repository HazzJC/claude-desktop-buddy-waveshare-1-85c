[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = no_ota_8mb.csv
board_build.filesystem = littlefs

build_src_filter =
    +<*>
    +<buddies/>
    +<hw/>
    -<main.cpp.m5stick.bak>
    -<xfer.h>
    -<ble_bridge.cpp>
    -<ble_bridge_nimble.cpp>

lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/SensorLib
    adafruit/Adafruit BusIO
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35

[env:waveshare-esp32s3-touch-lcd-1-85c-v2]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_src_filter = ${env.build_src_filter} +<ble_bridge.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_LCD_1_85C_V2
